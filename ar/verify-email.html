<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التحقق من البريد الإلكتروني – Vaktim</title>
  <link rel="stylesheet" href="/fonts.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Plus Jakarta Sans',system-ui,sans-serif;
      background:#06060e;
      color:#edeae3;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      -webkit-font-smoothing:antialiased;
      position:relative;
      overflow:hidden;
    }
    .geo{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.03;
      background-image:repeating-conic-gradient(from 0deg at 50% 50%,transparent 0deg 60deg,rgba(201,168,76,.5) 60deg 61deg,transparent 61deg 120deg);
      background-size:120px 120px;}
    .amb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .amb-1{width:500px;height:500px;top:-150px;right:-100px;background:radial-gradient(circle,rgba(201,168,76,.1),transparent 70%)}
    .amb-2{width:400px;height:400px;bottom:10%;left:-120px;background:radial-gradient(circle,rgba(16,185,129,.08),transparent 70%)}

    .card{
      position:relative;z-index:1;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      padding:3rem 2.5rem;
      max-width:460px;
      width:100%;
      text-align:center;
      box-shadow:0 30px 80px rgba(0,0,0,.4);
    }
    .card::before{content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(201,168,76,.04),transparent 60%);pointer-events:none}

    .brand{font-size:1.3rem;font-weight:800;color:#c9a84c;margin-bottom:2rem;letter-spacing:-.01em}

    .spinner{
      width:52px;height:52px;
      border:3px solid rgba(255,255,255,.06);
      border-top:3px solid #10b981;
      border-radius:50%;
      animation:spin .8s linear infinite;
      margin:0 auto 1.5rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .icon{
      width:68px;height:68px;
      border-radius:50%;
      margin:0 auto 1.5rem;
      display:flex;align-items:center;justify-content:center;
    }
    .icon svg{width:36px;height:36px;stroke:#fff;stroke-width:2.5;fill:none}
    .icon.success{background:linear-gradient(135deg,#10b981,#059669)}
    .icon.error{background:linear-gradient(135deg,#ef4444,#dc2626)}

    h1{font-size:1.5rem;font-weight:800;margin-bottom:.6rem;letter-spacing:-.02em}
    p{font-size:.92rem;color:rgba(237,234,227,.55);line-height:1.6;margin-bottom:1.5rem}

    .btn{
      display:inline-block;
      padding:.8rem 2rem;
      border-radius:12px;
      font-weight:700;font-size:.9rem;
      border:none;cursor:pointer;
      text-decoration:none;
      transition:all .3s;
      margin:.3rem;
    }
    .btn-primary{
      background:linear-gradient(135deg,#10b981,#059669);
      color:#06060e;
      box-shadow:0 6px 20px rgba(16,185,129,.2);
    }
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(16,185,129,.3)}
    .btn-secondary{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:#edeae3;
    }
    .btn-secondary:hover{background:rgba(255,255,255,.07);border-color:rgba(201,168,76,.2)}

    .fallback{margin-top:1rem;font-size:.8rem;color:rgba(237,234,227,.35)}
    .fallback a{color:#c9a84c;text-decoration:none}
    .fallback a:hover{text-decoration:underline}

    #content{min-height:180px;position:relative;z-index:1}
  </style>
</head>
<body>
  <div class="geo" aria-hidden="true"></div>
  <div class="amb amb-1" aria-hidden="true"></div>
  <div class="amb amb-2" aria-hidden="true"></div>

  <div class="card">
    <div class="brand">Vaktim</div>
    <div id="content">
      <div class="spinner" id="spinner"></div>
      <h1 id="title">جارٍ التحقق من البريد الإلكتروني...</h1>
      <p id="message">انتظر من فضلك.</p>
    </div>
  </div>

  <script>
    const PROD_EDGE_URL = 'https://gercipqmupxuvyhsvqyo.supabase.co/functions/v1/verify-email-token';
    const PROD_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlcmNpcHFtdXB4dXZ5aHN2cXlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcyMDczMDIsImV4cCI6MjA1Mjc4MzMwMn0.f3b4886be950e9a1fb4497d4f9de30161fb1a9c7573bcf33a026c1e6c0e2e7f4';

    const urlParams = new URLSearchParams(window.location.search);
    const rawToken = urlParams.get('token');
    const token = (rawToken && /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(rawToken)) ? rawToken : null;
    const pref = urlParams.get('pref');
    const ak = urlParams.get('ak');
    const EDGE_FUNCTION_URL = pref ? 'https://' + pref + '.supabase.co/functions/v1/verify-email-token' : PROD_EDGE_URL;
    const SUPABASE_ANON_KEY = ak || PROD_ANON_KEY;

    const spinner = document.getElementById('spinner');
    const content = document.getElementById('content');

    let appOpenedSignal = false;
    let webVerifyStarted = false;
    let fallbackTimer = null;

    function createIcon(type) {
      var div = document.createElement('div');
      div.className = 'icon ' + type;
      var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 24 24');
      var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', type === 'success' ? 'M20 6L9 17l-5-5' : 'M18 6L6 18M6 6l12 12');
      svg.appendChild(path);
      div.appendChild(svg);
      return div;
    }

    function showWebSuccess() {
      spinner.style.display = 'none';
      content.textContent = '';
      content.appendChild(createIcon('success'));
      var h = document.createElement('h1');
      h.textContent = 'تم التحقق من البريد الإلكتروني!';
      content.appendChild(h);
      var p = document.createElement('p');
      p.textContent = 'تم تفعيل حسابك بنجاح. يمكنك الآن الوصول إلى جميع الميزات.';
      content.appendChild(p);
      var btn = document.createElement('button');
      btn.className = 'btn btn-primary';
      btn.textContent = 'افتح التطبيق';
      btn.addEventListener('click', function() { window.location.href = 'vaktim://'; });
      content.appendChild(btn);
      var fb = document.createElement('p');
      fb.className = 'fallback';
      fb.textContent = 'إذا لم يكن التطبيق لديك، ';
      var a = document.createElement('a');
      a.href = 'https://vaktim.app';
      a.textContent = 'يمكنك تنزيله من هنا';
      fb.appendChild(a);
      content.appendChild(fb);
      setTimeout(function() { window.location.href = 'vaktim://'; }, 800);
    }

    function showAppHandled() {
      spinner.style.display = 'none';
      content.textContent = '';
      content.appendChild(createIcon('success'));
      var h = document.createElement('h1');
      h.textContent = 'تم فتح التطبيق';
      content.appendChild(h);
      var p = document.createElement('p');
      p.textContent = 'يتم إتمام التحقق في التطبيق. يمكنك العودة إليه الآن.';
      content.appendChild(p);
      var btn = document.createElement('button');
      btn.className = 'btn btn-primary';
      btn.textContent = 'العودة إلى التطبيق';
      btn.addEventListener('click', function() { window.location.href = 'vaktim://'; });
      content.appendChild(btn);
    }

    function showError(errorMessage) {
      spinner.style.display = 'none';
      content.textContent = '';
      content.appendChild(createIcon('error'));
      var h = document.createElement('h1');
      h.textContent = 'فشل التحقق';
      content.appendChild(h);
      var p = document.createElement('p');
      p.textContent = errorMessage;
      content.appendChild(p);
      var btn = document.createElement('button');
      btn.className = 'btn btn-secondary';
      btn.textContent = 'العودة إلى الصفحة الرئيسية';
      btn.addEventListener('click', function() { window.location.href = 'https://vaktim.app'; });
      content.appendChild(btn);
    }

    async function verifyOnWeb() {
      if (webVerifyStarted) return;
      webVerifyStarted = true;
      try {
        const response = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ token: token })
        });
        if (response.ok) {
          showWebSuccess();
        } else {
          if (response.status === 404) showError('رابط التحقق غير صالح أو تم استخدامه مسبقًا. يرجى طلب رابط جديد.');
          else if (response.status === 410) showError('انتهت صلاحية رابط التحقق. يرجى طلب رابط جديد من التطبيق.');
          else if (response.status === 400) showError('تم استخدام رابط التحقق هذا من قبل.');
          else showError('حدث خطأ أثناء التحقق. يرجى المحاولة لاحقًا.');
        }
      } catch (err) {
        showError('خطأ في الاتصال. يرجى التحقق من اتصال الإنترنت والمحاولة مرة أخرى.');
      }
    }

    function init() {
      if (!token) {
        showError('لم يتم العثور على رمز التحقق. يرجى الضغط على الرابط في بريدك الإلكتروني مرة أخرى.');
        return;
      }

      window.location.href = 'vaktim://verify-email?token=' + encodeURIComponent(token);

      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          appOpenedSignal = true;
          clearTimeout(fallbackTimer);
        } else if (appOpenedSignal && !webVerifyStarted) {
          showAppHandled();
        }
      });

      fallbackTimer = setTimeout(function() {
        if (!appOpenedSignal) {
          verifyOnWeb();
        }
      }, 1500);
    }

    init();
  </script>
<script src="/js/language-switcher.js"></script>
</body>
</html>
